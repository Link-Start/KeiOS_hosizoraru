name: Setup Android Gradle build
description: Prepare JDK, Gradle, Android SDK, and GitHub Packages credentials for Android CI jobs.

inputs:
  android-build-tools-version:
    description: Android build-tools version to install.
    required: false
    default: "37.0.0"
  android-platform-version:
    description: Primary Android SDK platform package to install.
    required: false
    default: "android-37.0"
  android-platform-fallback-version:
    description: Fallback Android SDK platform package to install when the primary package is unavailable.
    required: false
    default: "android-37"
  cmdline-tools-version:
    description: Android command-line tools version.
    required: false
    default: "12266719"
  java-version:
    description: JDK version to install.
    required: false
    default: "21"
  github-actor:
    description: GitHub Packages username.
    required: true
  github-token:
    description: GitHub Packages token.
    required: true
  cache-read-only:
    description: Read existing Gradle caches without writing new cache entries.
    required: false
    default: "false"
  build-scan-publish:
    description: Publish Gradle Build Scan data for this job.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@v6

    - name: Setup JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-provider: enhanced
        cache-read-only: ${{ inputs.cache-read-only }}
        cache-cleanup: on-success
        build-scan-publish: ${{ inputs.build-scan-publish }}
        build-scan-terms-of-use-url: https://gradle.com/terms-of-service
        build-scan-terms-of-use-agree: yes

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4
      with:
        cmdline-tools-version: ${{ inputs.cmdline-tools-version }}
        accept-android-sdk-licenses: true

    - name: Install Android SDK components
      shell: bash
      env:
        ANDROID_BUILD_TOOLS_VERSION: ${{ inputs.android-build-tools-version }}
        ANDROID_PLATFORM_VERSION: ${{ inputs.android-platform-version }}
        ANDROID_PLATFORM_FALLBACK_VERSION: ${{ inputs.android-platform-fallback-version }}
      run: |
        set -euo pipefail
        SDKMANAGER="$(command -v sdkmanager)"
        echo "Using sdkmanager: ${SDKMANAGER}"

        "${SDKMANAGER}" --channel=3 "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"
        if "${SDKMANAGER}" --channel=3 "platforms;${ANDROID_PLATFORM_VERSION}"; then
          echo "Installed SDK platform: ${ANDROID_PLATFORM_VERSION}"
        else
          "${SDKMANAGER}" --channel=3 "platforms;${ANDROID_PLATFORM_FALLBACK_VERSION}"
          echo "Installed SDK platform: ${ANDROID_PLATFORM_FALLBACK_VERSION}"
        fi

    - name: Prepare Gradle credentials for GitHub Packages
      shell: bash
      env:
        GPR_USER: ${{ inputs.github-actor }}
        GPR_KEY: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        mkdir -p "${HOME}/.gradle"
        {
          echo "gpr.user=${GPR_USER}"
          echo "gpr.key=${GPR_KEY}"
        } >> "${HOME}/.gradle/gradle.properties"

    - name: Prepare KeiOS version metadata
      shell: bash
      run: |
        set -euo pipefail

        latest_tag="$(git tag --merged HEAD --sort=-v:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
        if [[ -z "${latest_tag}" ]]; then
          latest_tag="v1.8.3"
        fi
        release_version="${latest_tag#v}"

        IFS='.' read -r major minor patch <<< "${release_version}"
        next_patch="$((patch + 1))"
        next_version="${major}.${minor}.${next_patch}"

        relative_count="$(git rev-list --count "${latest_tag}..HEAD" 2>/dev/null || echo 0)"
        total_count="$(git rev-list --count HEAD 2>/dev/null || echo 0)"
        short_hash="$(git rev-parse --short=12 HEAD)"
        branch_name="$(git rev-parse --abbrev-ref HEAD | tr -c 'A-Za-z0-9._-' '-')"
        dirty="false"
        if [[ -n "$(git status --porcelain)" ]]; then
          dirty="true"
        fi
        timestamp_millis="$(($(date +%s) * 1000))"

        {
          echo "keios.version.name=${release_version}"
          echo "keios.nextVersion.name=${next_version}"
          echo "keios.version.anchorTag=${latest_tag}"
          echo "keios.git.available=true"
          echo "keios.git.relativeCommitCount=${relative_count}"
          echo "keios.git.totalCommitCount=${total_count}"
          echo "keios.git.shortHash=${short_hash}"
          echo "keios.git.branchName=${branch_name}"
          echo "keios.git.worktreeDirty=${dirty}"
          echo "keios.build.timestampMillis=${timestamp_millis}"
        } >> "${HOME}/.gradle/gradle.properties"

        echo "KeiOS release version: ${release_version}"
        echo "KeiOS benchmark/debug version: ${next_version}+${relative_count}.g${short_hash}"
