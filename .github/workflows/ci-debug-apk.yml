name: CI / Debug APK
run-name: Debug APK - ${{ github.event.inputs.commit || github.ref_name }}

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      commit:
        description: Commit SHA/branch/tag to build (optional). Leave empty to build the latest commit on selected branch.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_BUILD_TOOLS_VERSION: "37.0.0"
      EXPECTED_APK_SIGNER_SHA256: "0ef11332dc8107b78535bac6d3507c6c52c2224630c84efd8d44c3d921ff4fd8"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.commit || github.sha }}

      - name: Build context
        id: context
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          {
            echo "commit_sha=${COMMIT_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
          } >> "${GITHUB_OUTPUT}"
          echo "Commit: ${COMMIT_SHA}"
          echo "Short commit: ${SHORT_SHA}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true

      - name: Install Android 37 SDK components
        run: |
          set -euo pipefail
          SDKMANAGER="$(command -v sdkmanager)"
          echo "Using sdkmanager: ${SDKMANAGER}"

          "${SDKMANAGER}" --channel=3 "build-tools;${ANDROID_BUILD_TOOLS_VERSION}"
          if "${SDKMANAGER}" --channel=3 "platforms;android-37.0"; then
            echo "Installed SDK platform: android-37.0"
          else
            "${SDKMANAGER}" --channel=3 "platforms;android-37"
            echo "Installed SDK platform: android-37"
          fi

      - name: Prepare Gradle credentials for GitHub Packages
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.gradle"
          {
            echo "gpr.user=${GITHUB_ACTOR}"
            echo "gpr.key=${GITHUB_TOKEN}"
          } >> "${HOME}/.gradle/gradle.properties"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Compose artifact metadata
        id: meta
        uses: ./.github/actions/prepare-android-apk-artifact
        with:
          variant: debug
          metadata-path: app/build/outputs/apk/debug/output-metadata.json

      - name: Verify debug APK signing certificate
        run: |
          set -euo pipefail
          APK_PATH="${{ steps.meta.outputs.apk-path }}"
          ACTUAL_SHA256="$("${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/apksigner" verify --print-certs "${APK_PATH}" \
            | awk -F': ' '/certificate SHA-256 digest/ {print tolower($NF); exit}')"
          echo "Debug signer SHA-256: ${ACTUAL_SHA256}"
          test "${ACTUAL_SHA256}" = "${EXPECTED_APK_SIGNER_SHA256}"

      - name: Prepare artifact
        id: artifact
        run: |
          set -euo pipefail
          APK_FILE_NAME="KeiOS-debug-${{ steps.context.outputs.short_sha }}.apk"
          cp "${{ steps.meta.outputs.apk-path }}" "${RUNNER_TEMP}/${APK_FILE_NAME}"
          echo "apk_file_name=${APK_FILE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${APK_FILE_NAME%.apk}" >> "${GITHUB_OUTPUT}"

      - name: Upload debug APK
        id: upload_apk
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.artifact.outputs.apk_file_name }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Write artifact summary
        run: |
          {
            echo "### Debug APK artifact"
            echo ""
            echo "- Artifact: \`${{ steps.artifact.outputs.artifact_name }}\`"
            echo "- File: \`${{ steps.artifact.outputs.apk_file_name }}\`"
            echo "- Application ID: \`${{ steps.meta.outputs.application-id }}\`"
            echo "- Variant: \`${{ steps.meta.outputs.variant-name }}\`"
            echo "- Version: \`${{ steps.meta.outputs.version-name }}\` (\`${{ steps.meta.outputs.version-code }}\`)"
            echo "- Commit: \`${{ steps.context.outputs.commit_sha }}\`"
            echo "- Run number: \`${{ steps.context.outputs.run_number }}\`"
            echo "- Digest: \`${{ steps.upload_apk.outputs.artifact-digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
