name: CI / Debug APK
run-name: "D#${{ github.run_number }} - ${{ github.event.pull_request.title || github.event.head_commit.message || github.event.inputs.commit || github.ref_name }}"

on:
  push:
    branches:
      - master
    paths:
      - ".github/actions/prepare-android-apk-artifact/**"
      - ".github/actions/setup-android-gradle-build/**"
      - ".github/workflows/ci-debug-apk.yml"
      - "app/**"
      - "baselineprofile/**"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "scripts/ci/**"
      - "settings.gradle.kts"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - master
    paths:
      - ".github/actions/prepare-android-apk-artifact/**"
      - ".github/actions/setup-android-gradle-build/**"
      - ".github/workflows/ci-debug-apk.yml"
      - "app/**"
      - "baselineprofile/**"
      - "build.gradle.kts"
      - "gradle.properties"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
      - "scripts/ci/**"
      - "settings.gradle.kts"
  workflow_dispatch:
    inputs:
      commit:
        description: Commit SHA/branch/tag to build (optional). Leave empty to build the latest commit on selected branch.
        required: false
        type: string
      publish-build-scan:
        description: Publish Gradle Build Scan data for this run.
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

defaults:
  run:
    shell: bash

jobs:
  build-debug-apk:
    name: Build debug APK
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_BUILD_TOOLS_VERSION: "37.0.0"
      EXPECTED_APK_SIGNER_SHA256: "0ef11332dc8107b78535bac6d3507c6c52c2224630c84efd8d44c3d921ff4fd8"
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.commit || github.sha }}

      - name: Build context
        id: context
        run: |
          set -euo pipefail
          COMMIT_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          {
            echo "commit_sha=${COMMIT_SHA}"
            echo "short_sha=${SHORT_SHA}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
          } >> "${GITHUB_OUTPUT}"
          echo "Commit: ${COMMIT_SHA}"
          echo "Short commit: ${SHORT_SHA}"
          echo "Run number: ${GITHUB_RUN_NUMBER}"

      - name: Setup Android Gradle build
        uses: ./.github/actions/setup-android-gradle-build
        with:
          android-build-tools-version: ${{ env.ANDROID_BUILD_TOOLS_VERSION }}
          github-actor: ${{ env.GITHUB_ACTOR }}
          github-token: ${{ env.GITHUB_TOKEN }}
          build-scan-publish: ${{ github.event.inputs.publish-build-scan || 'false' }}

      - name: Prepare Firebase config
        env:
          GOOGLE_SERVICES_JSON_DEBUG_B64: ${{ secrets.GOOGLE_SERVICES_JSON_DEBUG_B64 }}
          ALLOW_GOOGLE_SERVICES_STUB: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          scripts/ci/write_google_services_json.sh \
            debug \
            app/src/debug/google-services.json \
            GOOGLE_SERVICES_JSON_DEBUG_B64 \
            os.kei.debug

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Compose artifact metadata
        id: meta
        uses: ./.github/actions/prepare-android-apk-artifact
        with:
          variant: debug
          metadata-path: app/build/outputs/apk/debug/output-metadata.json

      - name: Verify debug APK signing certificate
        run: |
          set -euo pipefail
          APK_PATH="${{ steps.meta.outputs.apk-path }}"
          ACTUAL_SHA256="$("${ANDROID_HOME}/build-tools/${ANDROID_BUILD_TOOLS_VERSION}/apksigner" verify --print-certs "${APK_PATH}" \
            | awk -F': ' '/certificate SHA-256 digest/ {print tolower($NF); exit}')"
          echo "Debug signer SHA-256: ${ACTUAL_SHA256}"
          test "${ACTUAL_SHA256}" = "${EXPECTED_APK_SIGNER_SHA256}"

      - name: Prepare artifact
        id: artifact
        run: |
          set -euo pipefail
          APK_FILE_NAME="${{ steps.meta.outputs.apk-file-name }}"
          cp "${{ steps.meta.outputs.apk-path }}" "${RUNNER_TEMP}/${APK_FILE_NAME}"
          echo "apk_file_name=${APK_FILE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "artifact_name=${{ steps.meta.outputs.artifact-name }}" >> "${GITHUB_OUTPUT}"

      - name: Upload debug APK
        id: upload_apk
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: ${{ runner.temp }}/${{ steps.artifact.outputs.apk_file_name }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Write artifact summary
        run: |
          {
            echo "### Debug APK artifact"
            echo ""
            echo "- Artifact: \`${{ steps.artifact.outputs.artifact_name }}\`"
            echo "- File: \`${{ steps.artifact.outputs.apk_file_name }}\`"
            echo "- Application ID: \`${{ steps.meta.outputs.application-id }}\`"
            echo "- Variant: \`${{ steps.meta.outputs.variant-name }}\`"
            echo "- Version: \`${{ steps.meta.outputs.version-name }}\` (\`${{ steps.meta.outputs.version-code }}\`)"
            echo "- Commit: \`${{ steps.context.outputs.commit_sha }}\`"
            echo "- Run number: \`${{ steps.context.outputs.run_number }}\`"
            echo "- Digest: \`${{ steps.upload_apk.outputs.artifact-digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
