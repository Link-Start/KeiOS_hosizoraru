name: Bug report
description: Report a reproducible problem in KeiOS.
title: "[Bug]: "
labels: [ "bug" ]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail for maintainers to reproduce it.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: What is the bug?
      placeholder: Describe the problem clearly.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: media
    attributes:
      label: Screenshots or recordings
      description: Drag and drop screenshots or screen recordings here if they help explain the issue.

  - type: input
    id: device
    attributes:
      label: Device model
      placeholder: Pixel 9, Xiaomi 15, emulator, etc.
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: Android 15 / 16 / 17, API level if known
    validations:
      required: true

  - type: input
    id: keios-version
    attributes:
      label: KeiOS version
      placeholder: App version, release tag, or commit hash
    validations:
      required: true

  - type: input
    id: install-source
    attributes:
      label: Install source
      placeholder: GitHub release, locally built APK, Android Studio, etc.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logcat output or crash logs. Remove private tokens or personal data.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I checked for existing related issues.
          required: true
        - label: I removed sensitive information from logs and screenshots.
          required: true
