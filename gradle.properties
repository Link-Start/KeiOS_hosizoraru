# Keep machine-specific Gradle/JDK paths in ~/.gradle/gradle.properties instead of this file.
# This project already tracks a cross-platform Gradle daemon JVM in gradle/gradle-daemon-jvm.properties
# for macOS, Windows, and Linux, so do not hardcode org.gradle.java.home here.
# Example local-only keys:
#   org.gradle.java.home=/path/to/your/jdk
miuix.version=0.9.1-f7c90d71-SNAPSHOT
#   keios.github.liveBenchmark=true
#   keios.github.api.token=ghp_xxx
#   keios.github.liveTargets=topjohnwu/Magisk,neovim/neovim
#   keios.github.forceGuest=true
org.gradle.jvmargs=-Xmx6144m -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=2g
kotlin.daemon.jvmargs=-Xmx6144m -XX:+UseParallelGC
android.useAndroidX=true
android.r8.gradual.support=true
android.suppressUnsupportedCompileSdk=37.0
kotlin.code.style=official
android.nonTransitiveRClass=true
org.gradle.caching=true
org.gradle.configuration-cache=true
org.gradle.parallel=true
kotlin.incremental.useClasspathSnapshot=true
